services:
  database:
    image: mysql:8.4
    container_name: college_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-college_app}
      MYSQL_USER: ${MYSQL_USER:-college_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-college_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: college_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-college_app}
      DB_USER: ${MYSQL_USER:-college_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-college_password}
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
    container_name: college_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:

